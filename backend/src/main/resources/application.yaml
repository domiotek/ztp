spring:
  application:
    name: fintrack

  datasource:
    username: ${SPRING_DB_USERNAME:postgres}
    password: ${SPRING_DB_PASSWORD:postgres}
    url: ${SPRING_DB_URL:jdbc:postgresql://localhost:5432/fintrack}
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: true
  threads:
    virtual:
      enabled: true

  data:
    redis:
      repositories:
        enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.tool.schema: DEBUG
    org.springframework.orm.jpa: DEBUG
    com.example.fintrack: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  swagger-ui:
    operationsSorter: method

application:
  database:
    check-schema: ${APPLICATION_DATABASE_CHECK_SCHEMA:false}
  security:
    access-jwt:
      secret-key: 4158465a2f6a272c253b4468423246663f3c4a7951673a544c452e2c4d36465c
      expiration: 600000 # 10 minutes
    #      expiration: 3600000 // 1 hour
    refresh-jwt:
      secret-key: 294C4D868F5CC153E538D5DD921B1612263C3D700EF1662E6C89903DE0FF3F9F
      expiration: 2592000000